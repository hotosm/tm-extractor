name: Keepalive
on:
  schedule:
    - cron: "45 5 * * 1" # Mondays 05:45 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Empty commit if repo is going stale
        run: |
          days_old=$(( ( $(date -u +%s) - $(git log -1 --format=%ct) ) / 86400 ))
          echo "Last commit was $days_old day(s) ago"
          if [ "$days_old" -lt 30 ]; then
            echo "Fresh enough; skipping."
            exit 0
          fi
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit --allow-empty -m "chore(keepalive): $(date -u +%FT%TZ)"
          git push
